<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রিমিয়াম লাইভ স্ট্রিম ইউআই</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h2><i class="fa-solid fa-circle-play"></i> EXPLAINED <span>SIFAT</span></h2>
        </div>
        <div class="header-right">
            <div class="viewer-box">
                <i class="fa-solid fa-eye"></i>
                <span id="liveViewers">14,520</span> ওয়াচিং
            </div>
            <button class="admin-btn" id="openAdmin" title="অ্যাডমিন প্যানেল"><i class="fa-solid fa-user-gear"></i></button>
        </div>
    </header>

    <main class="container">
        <div class="player-header">
            <span class="status-badge"><i class="fa-solid fa-circle pulse"></i> লাইভ</span>
            <h1 id="streamTitle">Fox USA - Live Stream</h1>
        </div>

        <div class="video-wrapper">
            <iframe id="livePlayer" src="" width="100%" height="100%" frameborder="0" scrolling="no" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>
        </div>
    </main>

    <div class="popup" id="subPopup">
        <div class="popup-content">
            <div class="popup-icon">
                <i class="fa-brands fa-youtube"></i>
            </div>
            <div class="popup-text">
                <p>লাইভ স্ট্রিমটি ভালো লাগলে</p>
                <h4>আমাদের ইউটিউব চ্যানেলটি সাবস্ক্রাইব করুন!</h4>
            </div>
        </div>
        <a href="https://youtube.com/@sifatedit_z?si=FQUkBiEpUjxoQIsi" target="_blank" class="sub-btn" id="subBtn">
            <i class="fa-solid fa-bell"></i> Subscribe
        </a>
    </div>

    <div class="modal" id="adminModal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            
            <div id="loginForm">
                <h3>অ্যাডমিন লগইন</h3>
                <p style="color: #aaa; font-size: 13px; margin-bottom: 15px;">শুধুমাত্র অ্যাডমিন এক্সেস</p>
                <input type="password" id="adminPassword" placeholder="পাসওয়ার্ড দিন (Default: admin123)">
                <button id="loginBtn">লগইন</button>
            </div>

            <div id="adminActions" class="hidden">
                <h3>স্ট্রিম লিঙ্ক আপডেট</h3>
                <p style="color: #aaa; font-size: 13px; margin-bottom: 15px;">এখানে পুরো Iframe কোড অথবা শুধু URL লিঙ্কটি পেস্ট করুন</p>
                <input type="text" id="newStreamLink" placeholder="<iframe src='...' ...></iframe> অথবা URL">
                <button id="updateLinkBtn">লিঙ্ক পরিবর্তন করুন</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
